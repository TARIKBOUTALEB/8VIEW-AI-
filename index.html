
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Professional 3D Workflow Generator powered by Gemini 3. Generate precise 8-view orthographic sheets and 3D Models.">
    <meta name="theme-color" content="#050505">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23b91c1c' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='12' cy='8' r='4'/%3E%3Ccircle cx='12' cy='16' r='4'/%3E%3C/svg%3E">

    <title>8 VIEW AI - STUDIO QUALITY 3D</title>
    
    <!-- Model Viewer Script -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#050505',
              surface: '#0c0c0e',
              surfaceHighlight: '#161618',
              primary: '#b91c1c',
              accent: '#dc2626',
              text: '#e4e4e7',
              muted: '#71717a',
              border: '#1f1f23'
            },
            fontFamily: {
              sans: ['Inter', 'Segoe UI', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    <style>
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #1f1f23; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #b91c1c; }
      
      body { 
        font-family: 'Inter', sans-serif; 
        overscroll-behavior-y: none; 
        background: #050505;
        margin: 0;
        padding: 0;
      }
      
      .studio-grid {
        background-image: radial-gradient(circle at 1px 1px, #121214 1px, transparent 0);
        background-size: 40px 40px;
      }

      model-viewer {
        width: 100% !important;
        height: 100% !important;
        display: block;
        background-color: #050505;
        --poster-color: transparent;
      }
      
      .page-transition {
        animation: fadeIn 0.8s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      /* Fix mobile viewport height */
      .h-screen-safe {
        height: 100vh;
        height: 100svh;
      }
    </style>
</head>
<body class="bg-background text-text min-h-screen overflow-hidden selection:bg-primary/20">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
